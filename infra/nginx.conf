# Upstream WebSocket backend
upstream ws_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTPS + WebSocket proxy
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (certificates provisioned by certbot / ACM) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── WebSocket endpoint ───────────────────────────────────────────────────
    location / {
        proxy_pass          http://ws_backend;
        proxy_http_version  1.1;

        # Required headers for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (for ALB target group) ─────────────────────────────────
    location /health {
        proxy_pass         http://ws_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
